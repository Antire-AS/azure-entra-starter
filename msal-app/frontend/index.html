<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .prose p { margin: 0.5em 0; }
        .prose p:first-child { margin-top: 0; }
        .prose p:last-child { margin-bottom: 0; }
        .prose pre { background: #f3f4f6; padding: 0.75em; border-radius: 0.5em; overflow-x: auto; margin: 0.5em 0; }
        .prose code { font-size: 0.875em; }
        .prose ul, .prose ol { padding-left: 1.5em; margin: 0.5em 0; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col" x-data="chat()" x-cloak>

    <!-- Login screen (shown when not authenticated) -->
    <template x-if="!authenticated">
        <div class="flex-1 flex items-center justify-center">
            <div class="text-center">
                <h1 class="text-2xl font-semibold text-gray-800 mb-2">Chat</h1>
                <p class="text-gray-500 mb-6">Sign in with your organization account to continue.</p>
                <button @click="login()"
                    class="bg-blue-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-blue-700 transition-colors">
                    Sign in with Microsoft
                </button>
                <p x-show="authError" class="mt-4 text-sm text-red-600" x-text="authError"></p>
            </div>
        </div>
    </template>

    <!-- Chat interface (shown when authenticated) -->
    <template x-if="authenticated">
        <div class="flex flex-col h-full">
            <header class="bg-white border-b px-6 py-3 flex items-center justify-between shrink-0">
                <h1 class="text-lg font-semibold text-gray-800">Chat</h1>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500" x-text="currentUser"></span>
                    <button @click="logout()" class="text-sm text-gray-400 hover:text-red-600">Sign out</button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto px-4 py-6" x-ref="messages">
                <div class="max-w-3xl mx-auto space-y-4">
                    <template x-if="messages.length === 0 && !loading">
                        <div class="text-center text-gray-400 mt-20">
                            <p class="text-lg">Start a conversation</p>
                        </div>
                    </template>

                    <template x-for="msg in messages" :key="msg.id">
                        <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                            <div :class="{
                                'bg-blue-600 text-white rounded-2xl rounded-br-sm px-4 py-2 max-w-[75%]': msg.role === 'user',
                                'bg-white border rounded-2xl rounded-bl-sm px-4 py-2 max-w-[75%] prose': msg.role === 'assistant',
                                'bg-red-50 border border-red-200 text-red-700 rounded-2xl px-4 py-2 max-w-[75%] text-sm': msg.role === 'error'
                            }"
                            x-html="msg.role === 'assistant' ? renderMarkdown(msg.content) : escapeHtml(msg.content)">
                            </div>
                        </div>
                    </template>

                    <div x-show="loading" class="flex justify-start">
                        <div class="bg-white border rounded-2xl rounded-bl-sm px-4 py-3">
                            <div class="flex gap-1">
                                <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                                <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                                <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="border-t bg-white px-4 py-4 shrink-0">
                <form @submit.prevent="send" class="max-w-3xl mx-auto flex gap-3">
                    <input type="text" x-model="input"
                        placeholder="Type a message..."
                        class="flex-1 border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        :disabled="loading"
                        x-ref="input">
                    <button type="submit" :disabled="loading || !input.trim()"
                        class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-medium hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                        Send
                    </button>
                </form>
            </footer>
        </div>
    </template>

    <script>
    // --- MSAL Configuration ---
    // These values come from your Entra ID app registration.
    // Replace them with your own, or inject them at build time.
    //
    // CLIENT_ID: the Application (client) ID from your app registration.
    // TENANT_ID: your Entra ID tenant ID (the organization directory).
    //
    // After terraform apply, get these values:
    //   terraform output client_id
    //   terraform output tenant_id
    const CLIENT_ID = '__CLIENT_ID__';
    const TENANT_ID = '__TENANT_ID__';

    const msalConfig = {
        auth: {
            clientId: CLIENT_ID,
            authority: `https://login.microsoftonline.com/${TENANT_ID}`,
            redirectUri: window.location.origin,
            postLogoutRedirectUri: window.location.origin,
        },
        cache: {
            // sessionStorage: tokens are cleared when the tab closes.
            // Use "localStorage" if you want to persist across tabs/sessions.
            cacheLocation: 'sessionStorage',
        },
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);

    // The scopes requested during login.
    // "User.Read" gives the app access to the user's basic profile via Microsoft Graph.
    // "openid" and "profile" are included automatically by MSAL.
    const loginScopes = { scopes: ['User.Read'] };

    function chat() {
        return {
            authenticated: false,
            currentUser: '',
            authError: '',
            messages: [],
            input: '',
            loading: false,
            msgId: 0,
            _account: null,

            async init() {
                // Handle the redirect callback when Microsoft sends the user back.
                // This must run on every page load — it checks if the URL contains
                // an auth response and processes it.
                try {
                    const response = await msalInstance.handleRedirectPromise();
                    if (response) {
                        // User just completed login — use their account.
                        this._account = response.account;
                    }
                } catch (err) {
                    console.error('Redirect error:', err);
                    this.authError = 'Sign-in failed. Please try again.';
                    return;
                }

                // Check if there's already a signed-in account from a previous session.
                if (!this._account) {
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length > 0) {
                        this._account = accounts[0];
                    }
                }

                if (this._account) {
                    this.authenticated = true;
                    this.currentUser = this._account.username;
                    this.$nextTick(() => this.$refs.input?.focus());
                }
            },

            async login() {
                this.authError = '';
                try {
                    // Redirect the browser to Microsoft's login page.
                    // After login, Microsoft redirects back here and
                    // handleRedirectPromise() (above) picks up the response.
                    await msalInstance.loginRedirect(loginScopes);
                } catch (err) {
                    console.error('Login error:', err);
                    this.authError = 'Sign-in failed. Please try again.';
                }
            },

            async logout() {
                await msalInstance.logoutRedirect({
                    postLogoutRedirectUri: window.location.origin,
                });
            },

            // Get an ID token to send to the backend.
            // MSAL caches tokens and refreshes them automatically.
            // acquireTokenSilent never shows a popup or redirect — it uses
            // the cached refresh token to get a new ID token silently.
            async getIdToken() {
                try {
                    const response = await msalInstance.acquireTokenSilent({
                        ...loginScopes,
                        account: this._account,
                    });
                    return response.idToken;
                } catch (err) {
                    // Silent token acquisition failed — the refresh token may
                    // have expired. Fall back to an interactive redirect.
                    console.warn('Silent token failed, redirecting:', err);
                    await msalInstance.acquireTokenRedirect(loginScopes);
                    return null;
                }
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            renderMarkdown(text) {
                return marked.parse(text || '');
            },

            scrollToBottom() {
                this.$nextTick(() => {
                    this.$refs.messages.scrollTop = this.$refs.messages.scrollHeight;
                });
            },

            async send() {
                const content = this.input.trim();
                if (!content || this.loading) return;

                this.messages.push({ id: ++this.msgId, role: 'user', content });
                this.input = '';
                this.loading = true;
                this.scrollToBottom();

                try {
                    // Get a fresh ID token for this request.
                    const token = await this.getIdToken();
                    if (!token) return; // redirect in progress

                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`,
                        },
                        body: JSON.stringify({
                            messages: this.messages
                                .filter(m => m.role !== 'error')
                                .map(m => ({ role: m.role, content: m.content }))
                        })
                    });

                    if (res.status === 401) {
                        this.authenticated = false;
                        this.authError = 'Session expired. Please sign in again.';
                        this.loading = false;
                        return;
                    }

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const assistantMsg = { id: ++this.msgId, role: 'assistant', content: '' };
                    this.messages.push(assistantMsg);
                    this.loading = false;
                    this.scrollToBottom();

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        assistantMsg.content += decoder.decode(value, { stream: true });
                        this.scrollToBottom();
                    }
                } catch (err) {
                    this.loading = false;
                    this.messages.push({
                        id: ++this.msgId, role: 'error',
                        content: 'Failed to reach the chat API. Check your connection and try again.'
                    });
                    this.scrollToBottom();
                }

                this.$refs.input?.focus();
            }
        };
    }
    </script>
</body>
</html>
